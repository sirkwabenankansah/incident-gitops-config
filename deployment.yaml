apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: incident-portal 
  labels: 
    app: incident-portal 
spec: 
  replicas: 2 
  selector: 
    matchLabels: 
      app: incident-portal 
  strategy: 
    type: RollingUpdate 
    rollingUpdate: 
      maxUnavailable: 0 
      maxSurge: 1 
  template: 
    metadata: 
      labels: 
        app: incident-portal 
    spec: 
      containers: 
      - name: incident-portal 
        image: ghcr.io/sirkwabenankansah/incident-app:v1.0 
        ports: 
        - containerPort: 80 
        resources: 
          requests: 
            cpu: "100m" 
            memory: "64Mi" 
          limits: 
            cpu: "200m" 
            memory: "128Mi" 
        readinessProbe: 
          httpGet: 
            path: / 
            port: 80 
          initialDelaySeconds: 5 
          periodSeconds: 5